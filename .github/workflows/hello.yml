name: Hello GitHub Actions  # 工作流名称

on:                          # 触发条件
  push:
    branches: [ main ]       # 当 push 到 main 分支时触发
  pull_request:
    branches: [ main ]       # 当 PR 目标为 main 时触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64（MSVC 多配置，可执行文件在 build/Release/）
          - name: windows-amd64
            platform: windows-latest
            binary: build/Release/actions_test.exe
          # Ubuntu x64
          - name: linux-amd64
            platform: ubuntu-latest
            binary: build/actions_test
          # macOS Apple Silicon（arm64）
          - name: macos-arm64
            platform: macos-latest
            binary: build/actions_test
          # macOS Intel（x86_64）；若标签变更见 GitHub 文档
          - name: macos-x86_64
            platform: macos-15-intel
            binary: build/actions_test

    name: 构建 (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 显示运行环境
        shell: bash
        run: |
          echo "矩阵: ${{ matrix.name }}"
          echo "RUNNER_OS=$RUNNER_OS RUNNER_ARCH=$RUNNER_ARCH"
          uname -a 2>/dev/null || ver

      - name: 配置并编译
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
          fi

      - name: 运行可执行文件
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./build/Release/actions_test.exe
          else
            chmod +x ./build/actions_test
            ./build/actions_test
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: actions_test-${{ matrix.name }}
          path: ${{ matrix.binary }}
